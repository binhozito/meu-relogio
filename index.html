<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relógio Minimalista Bold</title>
    <style>
        body {
            background-color: black;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            text-align: center;
        }

        #hora {
            font-size: 9rem; 
            font-weight: 600; 
            line-height: 1;
            letter-spacing: -2px;
            font-variant-numeric: tabular-nums;
        }

        #data-container {
            margin-top: 10px;
            text-transform: lowercase;
            font-weight: 700; /* Aplica negrito na data toda */
        }

        #dia-semana {
            font-size: 2.5rem; 
            display: block;
            margin-bottom: -5px; 
        }

        #data-completa {
            font-size: 1.8rem; 
            color: #a0a0a0;
            display: block;
        }

        #clima {
            margin-top: 5px; 
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            color: #808080;
            font-weight: 700; /* Aplica negrito no clima */
        }

        #clima img {
            width: 50px;
            filter: grayscale(100%);
            margin-right: -5px; 
        }

        @media (max-width: 600px) {
            #hora { font-size: 5rem; }
            #dia-semana { font-size: 1.8rem; }
            #data-completa { font-size: 1.3rem; }
        }
    </style>
</head>
<body>

    <div id="hora">00:00</div>
    
    <div id="data-container">
        <span id="dia-semana">carregando...</span>
        <span id="data-completa"></span>
    </div>

    <div id="clima">carregando clima...</div>

    <script>
        const apiKey = "41434e6879a35f43a2e4b5d73aa46840"; 
        const cidade = "Sorocaba,BR"; 

        function atualizarRelogio() {
            const agora = new Date();
            const horas = String(agora.getHours()).padStart(2, '0');
            const minutos = String(agora.getMinutes()).padStart(2, '0');
            document.getElementById('hora').textContent = `${horas}:${minutos}`;

            const diaSemana = agora.toLocaleDateString('pt-BR', { weekday: 'long' });
            document.getElementById('dia-semana').textContent = diaSemana;

            const dataRestante = agora.toLocaleDateString('pt-BR', { day: 'numeric', month: 'long', year: 'numeric' });
            document.getElementById('data-completa').textContent = dataRestante;
        }

        async function obterClima() {
            try {
                const url = `https://api.openweathermap.org/data/2.5/weather?q=${cidade}&units=metric&lang=pt_br&appid=${apiKey}`;
                const resposta = await fetch(url);
                const dados = await resposta.json();

                if(dados.cod === 200) {
                    const temp = Math.round(dados.main.temp);
                    const desc = dados.weather[0].description;
                    const icone = dados.weather[0].icon;

                    document.getElementById('clima').innerHTML = `
                        <img src="https://openweathermap.org/img/wn/${icone}.png">
                        <span>${temp}°C • ${desc}</span>
                    `;
                } else {
                    document.getElementById('clima').textContent = "ativando chave da api...";
                }
            } catch (erro) {
                document.getElementById('clima').textContent = "clima indisponível";
            }
        }

        setInterval(atualizarRelogio, 1000);
        atualizarRelogio();
        obterClima();
        setInterval(obterClima, 900000); 
    </script>
</body>
</html>
